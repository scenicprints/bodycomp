name: bodycomp
description: "Body recomposition tracker."
publish_to: 'none'

# Version is the single source of truth for the app's version.
# The publish script bumps this, and the in-app updater compares it
# against the latest GitHub Release.
version: 1.19.1+39

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # In-app OTA updater
  http: ^1.2.2              # query the GitHub Releases API
  package_info_plus: ^8.1.0 # read the installed app version
  ota_update: ^7.0.0        # download + install the new APK

  # Food journal
  mobile_scanner: ^7.2.0    # barcode scanning via the camera
  image_picker: ^1.1.2      # capture a Nutrition Facts photo for label OCR
  google_mlkit_text_recognition: ^0.13.0 # on-device OCR of the label

  # 5K Trainer
  vibration: ^3.1.0         # run/walk haptic cues during a coached run
  flutter_tts: ^4.2.0       # optional spoken "run" / "walk" cues
  health: ^13.0.0           # import runs from Android Health Connect
  flutter_foreground_task: ^9.2.2  # keep the run timer alive with screen off

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1  # generates the app launcher icon

# App launcher icon. Source art is processed into these two files by a
# Pillow script (full dark square + padded transparent foreground).
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/bodycomp_icon.png"
  adaptive_icon_background: "#0E0F12"
  adaptive_icon_foreground: "assets/icon/bodycomp_icon_fg.png"
  min_sdk_android: 26

flutter:
  uses-material-design: true
